# SonarQube Cloud Configuration for MediBook Backend
# This file contains the configuration for analyzing your project with SonarQube Cloud

# Project identification
sonar.projectKey=your_project_key
sonar.projectName=MediBook 
sonar.projectVersion=0.0.1-SNAPSHOT
sonar.organization=your_organization

# Source code location
sonar.sources=.
sonar.exclusions=**/*test/**,**/target/**,**/node_modules/**

# Test location
sonar.tests=.
sonar.test.inclusions=**/*Test.java,**/*Tests.java

# Coverage reports
sonar.jacoco.reportPaths=**/target/site/jacoco/jacoco.xml

# Code coverage properties
sonar.coverage.exclusions=**/*Test.java,**/*Tests.java,**/config/**

# Java specific settings
sonar.java.source=21
sonar.java.target=21
sonar.java.binaries=**/target/classes

# Binaries location for better analysis
sonar.java.libraries=**/target/dependency/*.jar
